<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UniConnect | Login</title>
  <style>
    body {   
      margin:0;   
      height:100vh;   
      display:flex;   
      justify-content:center;   
      align-items:center;   
      font-family:Arial, sans-serif;   
      background:#0f2027;   
    }
    .login-box {  
      background:white;  
      width:320px;  
      padding:40px;  
      border-radius:15px;  
      text-align:center;  
      box-shadow:0 10px 30px rgba(0,0,0,0.4);  
    }
    .login-box h1 {   
      margin-bottom:25px;   
      letter-spacing:2px;   
    }
    input {   
      width:100%;   
      padding:14px;   
      font-size:18px;   
      margin-bottom:18px;   
      border-radius:8px;   
      border:1px solid #ccc;   
      text-align:center;   
    }
    button {   
      width:100%;   
      padding:14px;   
      font-size:18px;   
      background:#203a43;   
      color:white;   
      border:none;   
      border-radius:8px;   
      cursor:pointer;   
      transition: all 0.3s ease;
    }
    button:hover { 
      background:#4a63e0; 
      transform: scale(1.05);
    }
    #error {   
      color:red;   
      margin-top:10px;   
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>UniConnect</h1>
    <input type="text" id="userid" placeholder="USER ID" onkeydown="handleEnter(event)">
    <input type="password" id="password" placeholder="PASSWORD" onkeydown="handleEnter(event)">

    <button onclick="login()">LOGIN</button>
    <p id="error"></p>
  </div>

  <script>
    const users = {
      "Rajat Sharma": {
        password: "14042006",
        name: "Rajat Sharma",
        email: "hellorajatsharma@gmail.com",
        roll: "23CS34",
        role: "admin"

      },
      "Ravinder Yadav": {
        password: "09122004",
        name: "Ravinder Yadav",
        email: "yravinder818@gmail.com",
        roll: "23CS35",
        role: "student"
      },
      "Vishal Bhardwaj": {
        password: "21102006",
        name: "Vishal Bhardwaj",
        email: "vishal4bhardwaj@gmail.com",
        roll: "23CS55",
        role: "student"
      },
   

    };
    function login() {
      const user = document.getElementById("userid").value.trim();
      const pass = document.getElementById("password").value.trim();

      if(users[user] && users[user].password === pass){
        localStorage.setItem("currentUser", JSON.stringify(users[user]));
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("error").innerText = "Invalid User ID or Password";
      }
    }

    function handleEnter(event) {
      if(event.key === "Enter") login();
    }


    
  </script>

</body>
</html>
